name: Supabase Keep-Alive Ping

on:
  schedule:
    - cron: '0 6 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Consultar tabla pedidos
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/pedidos?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "HTTP status: $status"
          if [ "$status" != "200" ]; then
            echo "Supabase respondió $status (se esperaba 200)"
            exit 1
          fi
