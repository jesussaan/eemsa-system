name: Supabase Weekly Backup

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Crear carpeta de backup
        run: mkdir -p backup

      - name: Exportar pedidos
        run: |
          curl -s "${{ secrets.SUPABASE_URL }}/rest/v1/pedidos?select=*" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -o backup/pedidos.json

      - name: Exportar producción diaria
        run: |
          curl -s "${{ secrets.SUPABASE_URL }}/rest/v1/prod_diaria?select=*" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -o backup/prod_diaria.json

      - name: Exportar fallas
        run: |
          curl -s "${{ secrets.SUPABASE_URL }}/rest/v1/fallas?select=*" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -o backup/fallas.json

      - name: Exportar refacciones
        run: |
          curl -s "${{ secrets.SUPABASE_URL }}/rest/v1/refacciones?select=*" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -o backup/refacciones.json

      - name: Subir backup como artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: backup/
          retention-days: 30
